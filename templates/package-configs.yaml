# ============================================================================
# Package Configuration ConfigMap (File-based)
# ============================================================================
# This ConfigMap contains environment-specific config files for custom packages.
# Files are auto-discovered from files/{environment}/packages/*/config/*
# Each file is stored with a key of {PackageName}--{filename} to encode
# the source package and filename for the postStart copy hook.
#
# Usage:
#   1. Place config files at: files/{env}/packages/{PkgName}/config/{filename}
#   2. Set packageConfigs.enabled: true in your values file
#   3. Files are auto-discovered and mounted via ConfigMap
#   4. PostStart hook copies them to the writable packages directory
#
# Example file location:
#   files/dev/packages/AbTest/config/app.properties
#   -> ConfigMap key: AbTest--app.properties
#   -> Copied to: /opt/softwareag/IntegrationServer/packages/AbTest/config/app.properties
# ============================================================================
{{- if .Values.packageConfigs.enabled }}
{{- $pkgFiles := .Files.Glob (printf "files/%s/packages/*/config/*" .Values.environment) }}
{{- if $pkgFiles }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "webmethods-msr.fullname" . }}-package-configs
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "webmethods-msr.labels" . | nindent 4 }}
  annotations:
    description: "Environment-specific package configurations (file-based)"
data:
  {{- $envPrefix := printf "files/%s/packages/" $.Values.environment }}
  {{- range $path, $content := $pkgFiles }}
  {{- $relPath := trimPrefix $envPrefix $path }}
  {{- $parts := splitList "/" $relPath }}
  {{- $pkgName := index $parts 0 }}
  {{- $fileName := base $path }}
  # Package: {{ $pkgName }} | File: {{ $fileName }}
  {{ $pkgName }}--{{ $fileName }}: |
{{ $.Files.Get $path | indent 4 }}
  {{- end }}
{{- end }}
{{- end }}
