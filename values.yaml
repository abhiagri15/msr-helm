# webMethods MSR Helm Chart Values
# Multi-node Cluster Configuration

## Environment identifier (drives file selection from files/{environment}/)
## Set in environment-specific values files: values-dev.yaml, values-qa.yaml, values-prod.yaml
environment: ""

## Cluster Label (for multi-cluster monitoring within same namespace)
## When deploying multiple MSR clusters in the same namespace, use this label
## to differentiate them in Prometheus/Grafana dashboards and alerts.
## Example: "business1", "orders", "payments"
clusterLabel: ""

## StatefulSet Update Strategy
## RollingUpdate: pods updated in reverse ordinal order during helm upgrade
## OnDelete: pods only updated when manually deleted
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1

## Pod Management Policy
## OrderedReady: pods created/deleted in order (0, 1, 2...)
## Parallel: all pods created/deleted simultaneously
podManagementPolicy: OrderedReady

## Termination Grace Period (seconds)
## Time given to MSR to drain in-flight requests, close JDBC pools, and disconnect from UM
terminationGracePeriodSeconds: 90

## Cluster Configuration
replicaCount: 2  # Start with 2 nodes, can be scaled up

## Image Configuration
image:
  repository: abiwebmethods.azurecr.io/webmethods-microservicesruntime
  tag: "11.1.0.6-postgresql-v2"
  pullPolicy: IfNotPresent

## Service Configuration
service:
  type: ClusterIP
  ports:
    http: 5555
    https: 5543
    diagnostic: 9999

## Resource Configuration
resources:
  requests:
    memory: "1Gi"
    cpu: "500m"
  limits:
    memory: "2Gi"
    cpu: "1000m"

## ============================================================================
## Security Context Configuration
## ============================================================================
## Pod and container security settings following IBM/SoftwareAG best practices.
## The sagadmin user (UID=1724, GID=1724) is the standard non-root identity
## for all SoftwareAG/IBM webMethods containers.
##
## NOTE: readOnlyRootFilesystem is NOT enabled because MSR postStart hooks
## need write access to /opt/softwareag/IntegrationServer/config/server.cnf
## and /opt/softwareag/IntegrationServer/config/Caching/ on the container
## root filesystem. Enable only if you refactor these to use emptyDir volumes.
##
## The init container (copy-keyvault-keystores) runs as root (no securityContext)
## because it needs apt-get install and chown. This is expected and documented.
## ============================================================================
securityContext:
  # Pod-level security context
  pod:
    fsGroup: 1724                       # sagadmin group - ensures PVC files are group-accessible
    runAsUser: 1724                     # sagadmin user
    runAsGroup: 1724                    # sagadmin group
    runAsNonRoot: true                  # Prevent running as root
    fsGroupChangePolicy: "OnRootMismatch"  # Performance: only change ownership if mismatch
  # Container-level security context (applied to MSR container)
  container:
    runAsUser: 1724
    runAsGroup: 1724
    runAsNonRoot: true
    allowPrivilegeEscalation: false     # Prevent privilege escalation
    capabilities:
      drop:
        - ALL                           # Drop all Linux capabilities

## JVM Configuration
jvm:
  minMemory: "512m"
  maxMemory: "1024m"

## ============================================================================
## Logging Configuration
## ============================================================================
## Controls logging levels for Integration Server and adapters
## Valid levels: Off, Fatal, Error, Warn, Info, Debug, Trace
##
## IMPORTANT: Use "Info" for production, "Trace" only for debugging
## Trace level generates significant log volume and impacts performance
## ============================================================================
logging:
  # General IS debug level (Off, Fatal, Error, Warn, Info, Debug, Trace)
  level: "Info"

  # Enable verbose server logging
  verbose: false

  # Enable service audit logging
  auditLog: false

  # Enable detailed thread logging
  threadDump: false

  # JDBC logging
  jdbc:
    enabled: false
    level: "Info"

  # SAP Adapter logging configuration
  # Levels: 0=Off, 1=Fatal, 2=Error, 3=Warn, 4=Info, 5=Debug, 6=Trace
  sap:
    # SAP adapter internal log level (0-6, where 6=Trace)
    level: 4  # Default to Info (4)
    # JCo trace level (0-10, where 0=off, 10=most verbose)
    jcoTraceLevel: 0  # Default to off
    # JCo trace output path
    jcoTracePath: "/opt/softwareag/IntegrationServer/instances/default/logs"
    # Facility-specific logging for SAP (format: facility:level)
    # Example: "SAP*:6,SCC*:6" for TRACE on all SAP facilities
    facilities: ""

  # Spring Boot / SLF4J logging (for MSR components using Spring)
  spring:
    enabled: false  # Set to true to enable Spring Boot logging config
    rootLevel: "INFO"
    # Component-specific levels (only applied when spring.enabled=true)
    components:
      wm: "INFO"
      softwareag: "INFO"
      sapAdapter: "INFO"
      jco: "INFO"

## Persistent Storage (per pod)
persistence:
  enabled: true
  storageClass: "default"
  size: 5Gi
  accessMode: ReadWriteOnce

## JDBC Configuration (legacy - for backwards compatibility)
## NOTE: Use jdbcPool for MSR internal pools and jdbcAdapter for WmJDBCAdapter connections
jdbc:
  enabled: false  # Deprecated - use jdbcPool instead

## JDBC Pool Configuration (MSR Internal - ISInternal, Xref, ISDashboardStats)
## This creates the JDBC connection pool used by MSR for internal operations
## Credentials are injected via environment variables from the jdbc-secrets secret
jdbcPool:
  enabled: false  # Set to true to enable JDBC Pool
  pool:
    name: "IS-Pool"
    driverAlias: "PostgresqlDriver"
    dataSourceClass: "org.postgresql.ds.PGSimpleDataSource"
    minConns: 1
    maxConns: 25
    poolThreshold: 10
    waitingThread: 100
    expireTime: 60000
    useSSL: false
  functionalAliases:
    - name: "ISInternal"
      connPoolAlias: "IS-Pool"
      failFastMode: true
    - name: "ISDashboardStats"
      connPoolAlias: "IS-Pool"
      failFastMode: false
    - name: "Xref"
      connPoolAlias: "IS-Pool"
      failFastMode: true

## JDBC Adapter Configuration (WmJDBCAdapter connections)
## This creates adapter connections for the WmJDBCAdapter package
jdbcAdapter:
  enabled: false  # Set to true to enable JDBC Adapter connections
  connections: []
    # Example connection configuration:
    # - name: "AbTest3Connection"
    #   description: "JDBC Adapter Connection for AbTest3"
    #   packageName: "AbTest3"
    #   folderName: "connection"
    #   connectionType: "jdbc"
    #   connectionFactoryInterface: "javax.sql.DataSource"
    #   transactionType: "LOCAL_TRANSACTION"
    #   serverName: "${JDBC_ADAPTER_SERVER}"
    #   databaseName: "${JDBC_ADAPTER_DATABASE}"
    #   portNumber: "${JDBC_ADAPTER_PORT}"
    #   networkProtocol: ""
    #   user: "${JDBC_ADAPTER_USERNAME}"
    #   password: "${JDBC_ADAPTER_PASSWORD}"
    #   dataSourceClass: "com.microsoft.sqlserver.jdbc.SQLServerDataSource"
    #   otherProperties: "encrypt=true"
    #   minPoolSize: 1
    #   maxPoolSize: 10
    #   poolIncrementSize: 1
    #   blockTimeout: 30000
    #   expireTimeout: 60000
    #   startupRetryCount: 3
    #   startupBackoffSecs: 10

## Health Probes
healthProbes:
  startup:
    enabled: true
    path: /health
    port: 5555
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
  liveness:
    enabled: true
    path: /health
    port: 5555
    initialDelaySeconds: 120
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  readiness:
    enabled: true
    path: /health
    port: 5555
    initialDelaySeconds: 90
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

## Pod Disruption Budget (for high availability)
podDisruptionBudget:
  enabled: true
  minAvailable: 1

## Pod Anti-Affinity (spread pods across nodes)
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - wm-msr
          topologyKey: kubernetes.io/hostname

## Universal Messaging Configuration
um:
  enabled: false  # Set to false by default, override in environment-specific values
  connectionEnabled: true  # When UM is enabled, connection is enabled by default
  connectionAlias: "IS_UM_CONNECTION"
  url: "nsp://wm-um:9000"
  user: "Administrator"
  password: "manage"
  useCSQ: "true"
  csqSize: "-1"
  csqDrainInOrder: "true"

## ============================================================================
## License Key Configuration
## ============================================================================
## Mounts the environment-specific licenseKey.xml from files/{environment}/license/
## into the MSR container at the standard license path.
## Each environment (dev, qa, prod) can have its own license key file.
##
## File location in container:
##   /opt/softwareag/IntegrationServer/instances/default/config/licenseKey.xml
license:
  enabled: false

## ============================================================================
## MWS Single Sign-On (SSO) Configuration
## ============================================================================
## SAML Resolver URL for Single Sign-On with My webMethods Server.
## This URL is environment-specific (points to the MWS instance for each env).
## Property: watt.server.auth.samlResolver
mwsSamlResolverUrl: ""

## ============================================================================
## Extended Settings (Additional watt.* Properties via Config Template)
## ============================================================================
## Add extra watt.* properties to application.properties per environment.
## Uses settings.watt.* prefix per IBM Configuration Variables Template format.
## Ref: https://www.ibm.com/docs/en/webmethods-integration/wm-microservices-runtime
##
## Two approaches are supported (both can be used simultaneously):
##
## 1. VALUES MAP: Define key=value pairs directly in values files.
##    Use bare watt.* keys here — the chart auto-adds the "settings." prefix.
##    Good for simple properties like URL aliases, thread pool sizes, etc.
##
## 2. FILE-BASED: Place an extended-settings.cnf file at:
##    files/{environment}/config/extended-settings.cnf
##    Use full settings.watt.* prefix in the file (included as-is).
##    Good for complex or lengthy configurations maintained as standalone files.
##
## IMPORTANT: Do NOT duplicate properties already managed by the chart
## (logging, SAP, SAML, etc.) - they are set automatically from their
## own values sections.
## ============================================================================
extendedSettings:
  enabled: false

  # Key-value map of watt.* properties (chart auto-adds "settings." prefix)
  # Example:
  #   properties:
  #     watt.server.url.alias.myapi: "/rest/myapi"
  #     watt.server.url.alias.health: "/health"
  #     watt.net.maxClientKeepaliveConns: "100"
  #     watt.server.threadPool: "200"
  properties: {}

## ============================================================================
## Custom Wrapper Configuration (custom_wrapper.conf)
## ============================================================================
## JVM wrapper configuration for the Tanuki Java Service Wrapper.
## Environment-specific custom_wrapper.conf loaded from:
##   files/{environment}/configuration/custom_wrapper.conf
##
## This file controls JVM options, memory settings, library paths, and
## other wrapper-level configuration. It is read at JVM startup time
## BEFORE the Integration Server starts.
##
## Common use cases:
##   - Additional JVM system properties (wrapper.java.additional.4xx)
##   - Java library paths (wrapper.java.library.path.*)
##   - Wrapper timeouts and restart behavior
##   - JMX configuration
##
## IMPORTANT: Memory settings (wrapper.java.initmemory, wrapper.java.maxmemory)
## are already managed by the chart via jvm.minMemory and jvm.maxMemory.
## Do NOT set them again in custom_wrapper.conf to avoid conflicts.
##
## File location in container:
##   /opt/softwareag/IntegrationServer/instances/default/configuration/custom_wrapper.conf
## ============================================================================
customWrapper:
  enabled: false

## ============================================================================
## Web Services Endpoint Configuration
## ============================================================================
## WS endpoint configuration files auto-discovered from:
##   files/{environment}/config/endpoints/*.cnf
##
## Standard endpoint files (9 total):
##   - providerHTTP.cnf, providerHTTPS.cnf, providerJMS.cnf
##   - consumerHTTP.cnf, consumerHTTPS.cnf, consumerJMS.cnf
##   - messageAddressingHTTP.cnf, messageAddressingHTTPS.cnf, messageAddressingJMS.cnf
##
## These XML-format files configure web service provider/consumer endpoints
## and URL aliases visible in the IS Admin UI under Settings > Web Services.
##
## Files in config/endpoints/ are inside the PVC mount, so PostStart hook
## copies them from a read-only ConfigMap temp mount to the writable PVC.
##
## Mount location: /opt/softwareag/IntegrationServer/instances/default/config/endpoints/
## ============================================================================
endpointConfigs:
  enabled: false

## ============================================================================
## JMS/JNDI Configuration (UM JMS Provider)
## ============================================================================
## Mounts jms.cnf from files/{environment}/config/ and auto-discovers
## all JNDI provider files from files/{environment}/config/jndi/*
## Supports multiple JNDI providers (e.g., jndi_JNDI1.properties, jndi_EventProvider.properties)
jmsConfig:
  enabled: false

## ============================================================================
## Caching Configuration
## ============================================================================
## Public Cache Managers - In-memory Ehcache instances loaded from XML files
## XML files in files/{environment}/config/caching/*.xml are auto-discovered and mounted
## at /opt/softwareag/IntegrationServer/config/Caching/
caching:
  publicCacheManagers:
    enabled: false  # Set to true to load public cache manager XML files
    # Admin credentials for auto-starting cache managers via DSP endpoint
    adminUser: "Administrator"
    adminPassword: "manage"

## Terracotta Cache Manager Configuration
terracotta:
  enabled: false  # Set to false by default, override in environment-specific values
  cacheManagerName: "IS_TERRACOTTA_CACHE"
  urls: []  # Array of Terracotta server URLs, e.g., ["terracotta-0.terracotta.svc:9510"]
  waitForReady: true  # Add init container to wait for Terracotta servers to be ready before starting MSR

## Keystore Configuration
## Multiple keystores can be configured, each with a unique alias name
keystores: []
  # - aliasName: "DEFAULT_IS_KEYSTORE"
  #   description: "Default Integration Server Keystore"
  #   type: "JKS"  # JKS, PKCS12
  #   provider: "SUN"  # SUN, BC, SunJSSE
  #   location: "/opt/softwareag/IntegrationServer/config/security/keystore.jks"
  #   password: "manage"
  #   isHsm: false
  #   keys: []
  #     # - keyAliasName: "sslkey"
  #     #   keyAliasPassword: "manage"

## Truststore Configuration
## Multiple truststores can be configured, each with a unique alias name
truststores: []
  # - aliasName: "DEFAULT_IS_TRUSTSTORE"
  #   description: "Default Integration Server Truststore"
  #   type: "JKS"  # JKS, PKCS12
  #   provider: "SUN"  # SUN, BC, SunJSSE
  #   location: "/opt/softwareag/IntegrationServer/config/security/truststore.jks"
  #   password: "manage"

## Autoscaling Configuration
autoscaling:
  enabled: false  # Set to false by default, override in environment-specific values
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

## Azure Key Vault Integration (using CSI driver)
## Retrieves certificates from Azure Key Vault and converts them to Java keystores/truststores
##
## How it works:
## 1. CSI Secrets Store Provider mounts certificates to /mnt/secrets-store/
## 2. Init container uses Azure CLI to download certificates with private keys
## 3. OpenSSL converts Azure's proprietary PFX format to PEM format
## 4. OpenSSL creates Java-compatible PKCS12 keystores
## 5. Java keytool creates truststores from public certificates
## 6. MSR loads keystores/truststores on startup
##
## Prerequisites:
## - Azure Key Vault created with certificates uploaded
## - AKS cluster with Azure Key Vault CSI driver enabled
## - Kubelet managed identity with Key Vault access (get, list permissions on secrets and certificates)
##
## Secret Key Naming Convention:
## All secrets in Azure Key Vault use environment-specific prefixes:
##   - dev_  : Development environment (e.g., dev-jdbc-pool-password)
##   - test_ : QA/Test environment (e.g., test-jdbc-pool-password)
##   - prod_ : Production environment (e.g., prod-jdbc-pool-password)
##
## For detailed setup instructions, see: AZURE_KEYVAULT_SETUP.md
azureKeyVault:
  enabled: false  # Set to true to enable Azure Key Vault integration
  vaultName: ""  # Name of the Azure Key Vault (e.g., "wM-kv")
  tenantId: ""  # Azure tenant ID (get from: az account show --query tenantId -o tsv)
  clientId: ""  # Client ID of the kubelet managed identity (get from: az aks show --query identityProfile.kubeletidentity.clientId -o tsv)

  # Environment-specific prefix for secret names in Azure Key Vault
  # Use "dev" for development, "test" for QA, "prod" for production
  # Secrets will be retrieved as: {secretKeyPrefix}-{secretName}
  # Example: dev-jdbc-pool-password, test-jdbc-pool-password, prod-jdbc-pool-password
  secretKeyPrefix: "dev"

  # Keystore Certificates (certificates with private keys)
  # These are downloaded using Azure CLI and converted to Java PKCS12 keystores by init container
  certificates: []
    # Example keystore certificate configuration:
    # - certName: "wm-cer"                      # Name of certificate in Azure Key Vault
    #   fileName: "wm_keystore.p12"             # Output keystore filename
    #   keystoreConfig:
    #     password: "changeit"                  # Keystore password
    #     keys:
    #       - keyAliasName: "wmservercert"      # Alias for the private key in keystore

  # Truststore Certificates (public certificates only)
  # These are mounted by CSI driver and imported into truststore by init container
  truststoreCerts: []
    # Example truststore certificate configuration:
    # - certName: "truststore-root-ca"          # Root CA certificate
    # - certName: "truststore-intermediate-ca"  # Intermediate CA certificate
    # - certName: "truststore-partner-cert"     # Partner/third-party certificate

  # Secrets from Azure Key Vault (for truststores configured via secrets)
  secrets: []
    # Example:
    # - fileName: "truststore.p12"
    #   truststoreConfig:
    #     aliasName: "WM_TRUSTSTORE"
    #     description: "webMethods Truststore"
    #     type: "PKCS12"
    #     provider: "SunJSSE"
    #     password: "changeit"

## Truststore Certificates Configuration
## Creates a combined truststore from multiple certificates in Azure Key Vault
truststoreCertificates:
  enabled: false  # Set to true to enable truststore creation from certificates
  fileName: "wm_truststore.p12"
  aliasName: "WM_TRUSTSTORE"
  description: "webMethods Truststore from Azure Key Vault"
  type: "PKCS12"
  provider: "SunJSSE"
  password: "changeit"
  certificates: []
    # Example certificates to import:
    # - certName: "truststore-root-ca"
    #   alias: "root-ca"
    # - certName: "truststore-partner-cert"
    #   alias: "partner-cert"

## ============================================================================
## Package Configurations (File-based)
## ============================================================================
## Environment-specific config files for IS packages are auto-discovered from:
##   files/{environment}/packages/{PackageName}/config/{filename}
##
## To add package configs:
##   1. Create the file at files/{env}/packages/{PkgName}/config/app.properties
##   2. Set packageConfigs.enabled: true
##   3. Files are auto-discovered via .Files.Glob (no values file changes needed)
##   4. PostStart hook copies files to writable package directories
##
## Sensitive values should use ${ENV_VAR} syntax, with secrets in Azure Key Vault
## ============================================================================
packageConfigs:
  enabled: false  # Set to true to enable file-based package configurations

## ============================================================================
## ESB App Configs (Outside IS Packages)
## ============================================================================
## External application config files auto-discovered from:
##   files/{environment}/ESB_App_Configs/{Pkg}/{subpath}/{filename}
##
## To add ESB app configs:
##   1. Create the file at files/{environment}/ESB_App_Configs/{Pkg}/{subpath}/filename
##   2. Set esbAppConfigs.enabled: true
##   3. Files are auto-discovered recursively via .Files.Glob
##   4. PostStart hook copies to /opt/softwareag/ESB_App_Configs/ preserving directory structure
## Note: ESB_App_Configs are environment-specific (under files/dev/, files/qa/, files/prod/)
## ============================================================================
esbAppConfigs:
  enabled: false  # Set to true when ESB App Config files exist

## ============================================================================
## Global Variables (globalVariables.cnf)
## ============================================================================
## IS global variables configuration file loaded from:
##   files/{environment}/config/globalVariables.cnf
## Mounted to /opt/softwareag/IntegrationServer/config/globalVariables.cnf
## ============================================================================
globalVariables:
  enabled: false  # Set to true to mount globalVariables.cnf

## ============================================================================
## File Access Control Configuration (WmPublic package - pub.file services)
## ============================================================================
## Controls which directories/files the Integration Server pub.file services can access
## This creates the fileAccessControl.cnf file in WmPublic/config directory
##
## Path Specification Format:
## - Single files: Specify exact path to restrict access to that file only
## - Directories: Grant access to all files within that directory
## - Multiple paths: Use semicolons as delimiters (no spaces between entries)
## - Wildcards: * matches directory names; ** matches multiple nested folders
## - Paths are case-sensitive on Linux and must use forward slashes
##
## Reference: https://www.ibm.com/docs/en/webmethods-integration/wm-integration-server/10.15.0?topic=guide-file-folder
## ============================================================================
fileAccessControl:
  enabled: false  # Set to true to enable file access control configuration

  # Directories/files with read permission for pub.file services
  # Example: /tmp;/opt/data;/mnt/shared/**
  allowedReadPaths: ""

  # Directories/files with write permission for pub.file services
  # Example: /tmp;/opt/data/output
  allowedWritePaths: ""

  # Directories/files with delete permission for pub.file services
  # Example: /tmp
  allowedDeletePaths: ""

## ============================================================================
## webMethods Cloud / Integration Live Configuration
## ============================================================================
## Enables connectivity to webMethods.io Integration / Integration Cloud
## Configuration files loaded from files/{environment}/integrationlive/
webMethodsCloud:
  enabled: false
  applicationFiles: {}
