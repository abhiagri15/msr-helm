#encoding=UTF-8
# Custom Wrapper Configuration - Dev Environment
# ===============================================
# Add your custom JVM properties with 400 series numbers or higher
# to prevent conflicts with properties added by Software AG.
#
# IMPORTANT: Memory settings (wrapper.java.initmemory, wrapper.java.maxmemory)
# are managed by the Helm chart via jvm.minMemory/maxMemory env vars.
# Do NOT set them here to avoid conflicts.

# JVM Options
wrapper.java.additional.400=-Dorg.apache.xml.dtm.DTMManager=org.apache.xml.dtm.ref.DTMManagerDefault
wrapper.java.additional.401=-Djavax.xml.xpath.XPathFactory:http://java.sun.com/jaxp/xpath/dom=com.sun.org.apache.xpath.internal.jaxp.XPathFactoryImpl
wrapper.java.additional.402=-Djava.security.properties=config/security/webm_override_java.security
wrapper.java.additional.403=-Djava.awt.headless=true
wrapper.java.additional.404=-DLog4jContextSelector=org.apache.logging.log4j.core.selector.BasicContextSelector

# Wrapper Behavior
wrapper.ping.timeout=300
wrapper.on_exit.42=RESTART
wrapper.restart.reload_configuration=TRUE
wrapper.single_invocation=TRUE
